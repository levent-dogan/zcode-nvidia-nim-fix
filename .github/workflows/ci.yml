name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  powershell:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - name: Validate Windows launcher syntax
        shell: powershell
        run: |
          $tokens = $null
          $errors = $null
          [System.Management.Automation.Language.Parser]::ParseFile(
            (Resolve-Path .\run_proxy.ps1),
            [ref]$tokens,
            [ref]$errors
          ) | Out-Null
          if ($errors.Count -gt 0) {
            $errors | ForEach-Object { Write-Error $_.Message }
            exit 1
          }

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install test tools
        run: python -m pip install --upgrade pip pytest ruff mypy
      - name: Lint
        run: python -m ruff check .
      - name: Type check
        run: python -m mypy nvidia_nim_proxy tests
      - name: Test
        run: python -m pytest
      - name: Build wheel
        run: python -m pip wheel --no-deps --wheel-dir wheelhouse .

name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install test tools
        run: python -m pip install --upgrade pip pytest ruff mypy
      - name: Lint
        run: python -m ruff check .
      - name: Type check
        run: python -m mypy nvidia_nim_proxy tests
      - name: Test
        run: python -m pytest
